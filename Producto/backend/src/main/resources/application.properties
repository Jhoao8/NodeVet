spring.application.name=app

# Conexion a tu base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/nodevet_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=root
# CONTRASEÑA DE WORKBENCH!
spring.datasource.password=admin123

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuracion para Mailtrap o Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${NODEVET_MAIL_EMAIL}
spring.mail.password=${NODEVET_MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000