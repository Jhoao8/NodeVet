# Indicar que es un entorno de pruebas
spring.application.name=app-test

# Conexión a la base de datos en memoria H2 (RAM)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto de H2 para JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Muy importante: Crear y destruir la base de datos con cada prueba
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true